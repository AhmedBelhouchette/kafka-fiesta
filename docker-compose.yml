services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - kafka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    networks:
      - kafka-network
    restart: unless-stopped

  spark-master:
    build: .                                      # ← Build depuis le Dockerfile
    container_name: spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host 0.0.0.0 --port 7077 --webui-port 8080
    volumes:
      - ./:/opt/spark-work-dir                    # ← Pour modifier les fichiers en temps réel
    ports:
      - "4040:8080"
      - "7077:7077"
    networks:
      - kafka-network
    restart: unless-stopped

  spark-worker:
    build: .                                      # ← Build depuis le Dockerfile
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8081
    volumes:
      - ./:/opt/spark-work-dir                    # ← Pour modifier les fichiers en temps réel
      - ./data-lake:/data-lake                    # executors write Parquet here
    ports:
      - "4041:8081"
    networks:
      - kafka-network
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${DOCKER_INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${DOCKER_INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${DOCKER_INFLUXDB_INIT_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
    networks:
      - kafka-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=
      # Anonymous read-only access so reviewers can view dashboards without a login.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      # Allow the dashboard to be embedded in the app's <iframe>.
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Consumed by the provisioned InfluxDB datasource (grafana/provisioning)
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      - kafka-network
    restart: unless-stopped

  # ==================== APPLICATION SERVICES ====================

  resource-manager:
    build: .
    container_name: resource-manager
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
    env_file: .env
    working_dir: /app/src/spark_jobs
    command: python -u resource_manager.py
    networks:
      - kafka-network
    restart: unless-stopped

  ml-predictor:
    build: .
    container_name: ml-predictor
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    working_dir: /app
    command: python -u src/spark_jobs/ml_predictor_fixed.py
    networks:
      - kafka-network
    restart: unless-stopped

  # Generators run inside the api process (auto-started, controllable from the UI).
  api:
    build: .
    container_name: api
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
    env_file: .env
    working_dir: /app/src/api
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    networks:
      - kafka-network
    restart: unless-stopped

  spark-streaming:
    build: .
    container_name: spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
      influxdb:
        condition: service_started
    env_file: .env
    environment:
      # Use the standalone cluster; set to local[*] if the cluster is unavailable.
      - SPARK_MASTER=spark://spark-master:7077
    working_dir: /app/src/spark_jobs
    command: python -u production_orchestrator.py
    volumes:
      - ./data-lake:/data-lake                    # driver writes checkpoints + reads lake
    networks:
      - kafka-network
    restart: unless-stopped

  energy-monitor:
    build: .
    container_name: energy-monitor
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
    env_file: .env
    working_dir: /app/src/spark_jobs
    command: python -u energy_monitor.py
    volumes:
      - ./data-lake:/data-lake
    networks:
      - kafka-network
    restart: unless-stopped

  maintenance-predictor:
    build: .
    container_name: maintenance-predictor
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
    env_file: .env
    working_dir: /app/src/spark_jobs
    command: python -u maintenance_predictor.py
    volumes:
      - ./data-lake:/data-lake
    networks:
      - kafka-network
    restart: unless-stopped

networks:
  kafka-network:
    driver: bridge

volumes:
  influxdb_data:
  grafana-data:
  kafka_data: