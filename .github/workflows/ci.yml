name: CI

on:
  push:
    branches: [main, test-simulateurs]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy "scikit-learn==1.5.1" pandas kafka-python python-dotenv pytest

      - name: Syntax check (all source)
        run: python -m compileall -q src scripts

      - name: Run tests
        run: pytest -q

      - name: Validate docker-compose
        run: |
          cp .env.example .env
          docker compose config -q
